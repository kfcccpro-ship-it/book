<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인재개발원 재고관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; word-break: keep-all; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 배경 효과 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(59,130,246,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(99,102,241,0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        /* 격자 패턴 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        /* 헤더 */
        .badge {
            display: inline-block;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #93c5fd;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 6px 16px;
            border-radius: 999px;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        h1 span {
            background: linear-gradient(135deg, #60a5fa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 48px;
        }

        /* 카드 그리드 */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 32px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .card-textbook::before {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.1));
        }

        .card-souvenir::before {
            background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.1));
        }

        .card:hover::before { opacity: 1; }

        .card:hover {
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card:active { transform: translateY(-2px); }

        .card-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .card-label {
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .card-desc {
            color: #64748b;
            font-size: 0.78rem;
            line-height: 1.5;
            text-align: center;
        }

        .card-arrow {
            position: absolute;
            bottom: 14px;
            right: 16px;
            color: rgba(255,255,255,0.2);
            font-size: 1.1rem;
            transition: color 0.2s, transform 0.2s;
        }

        .card:hover .card-arrow {
            color: rgba(255,255,255,0.5);
            transform: translate(2px, -2px);
        }

        /* 텍스트북 카드 강조 */
        .card-textbook {
            border-color: rgba(59,130,246,0.2);
        }

        /* 기념품 카드 */
        .card-souvenir {
            border-color: rgba(245,158,11,0.2);
        }

        /* Coming soon 뱃지 */
        .coming-soon {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(245,158,11,0.2);
            border: 1px solid rgba(245,158,11,0.3);
            color: #fbbf24;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 999px;
            letter-spacing: 0.05em;
        }

        /* 하단 정보 */
        .footer {
            color: #334155;
            font-size: 0.78rem;
        }

        /* 모바일 */
        @media (max-width: 420px) {
            .cards { grid-template-columns: 1fr; }
            .card { padding: 24px 20px; flex-direction: row; text-align: left; justify-content: flex-start; gap: 16px; }
            .card-icon { font-size: 2.2rem; flex-shrink: 0; }
            .card-desc { text-align: left; }
            .card-arrow { top: 50%; transform: translateY(-50%); right: 16px; bottom: auto; }
            .card:hover .card-arrow { transform: translateY(-50%) translateX(2px); }
        }

        /* 진입 애니메이션 */
        .container { animation: fadeUp 0.5s ease both; }
        .card:nth-child(1) { animation: fadeUp 0.5s 0.1s ease both; }
        .card:nth-child(2) { animation: fadeUp 0.5s 0.2s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">인재개발원</div>
        <h1>📦 <span>재고관리</span> 시스템</h1>
        <p class="subtitle">관리할 시스템을 선택하세요</p>

        <div class="cards">
            <a href="textbook.html" class="card card-textbook">
                <div class="card-icon">📖</div>
                <div class="card-label">교재 관리</div>
                <div class="card-desc">입고 · 출고 · 세팅<br>전체 플로우 관리</div>
                <div class="card-arrow">↗</div>
            </a>

            <a href="souvenir.html" class="card card-souvenir">
                <div class="coming-soon">준비중</div>
                <div class="card-icon">🎁</div>
                <div class="card-label">기념품 관리</div>
                <div class="card-desc">기념품 재고<br>수령·배부 관리</div>
                <div class="card-arrow">↗</div>
            </a>
        </div>

        <p class="footer">© 2026 인재개발원 재고관리 시스템</p>
    </div>
</body>
</html>
